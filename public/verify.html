<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ověření Emailu | HackShield</title>
    <link rel="stylesheet" href="style.css" />
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function () {
            emailjs.init("gUPFo7FLqNfZ8FEDf");
        })();
    </script>
    <style>
        body {
            overflow: hidden;
        }

        .code-inputs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 2rem 0;
        }

        .code-input {
            width: 50px;
            height: 60px;
            background: var(--bg-dark);
            border: 1px solid var(--border-soft);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1.5rem;
            text-align: center;
            font-family: var(--font-mono);
        }

        .code-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }
    </style>
</head>

<body>
    <div class="bg-grid"></div>

    <!-- Notification Toast -->


    <div class="auth-container">
        <div class="auth-card" style="text-align: center;">
            <div
                style="width: 60px; height: 60px; margin: 0 auto 1.5rem; background: rgba(124, 242, 107, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--accent);">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                    <polyline points="22,6 12,13 2,6" />
                </svg>
            </div>

            <h2>Ověřte svůj email</h2>
            <p style="color: var(--text-secondary); margin-bottom: 2rem;">
                Zadali jsme kód na email <strong id="userEmail" class="text-accent">...</strong><br>
                Zadejte jej pro dokončení registrace.
            </p>

            <div class="code-inputs" id="otpContainer">
                <input type="text" maxlength="1" class="code-input" autofocus>
                <input type="text" maxlength="1" class="code-input">
                <input type="text" maxlength="1" class="code-input">
                <input type="text" maxlength="1" class="code-input">
                <input type="text" maxlength="1" class="code-input">
                <input type="text" maxlength="1" class="code-input">
            </div>

            <button onclick="verifyCode()" class="btn btn-primary"
                style="width: 100%; justify-content: center; margin-bottom: 1rem;">
                Ověřit
            </button>

            <p style="font-size: 0.85rem; color: var(--text-muted);">
                Nepřišel vám email? <a href="#" onclick="resendEmail()">Odeslat znovu</a>
            </p>
        </div>
    </div>

    <script>
        // Get temp user data
        const tempUser = JSON.parse(localStorage.getItem('hackshield_temp_user'));

        if (!tempUser) {
            window.location.href = 'register.html';
        }

        document.getElementById('userEmail').textContent = tempUser.email;

        // Auto-focus logic
        const inputs = document.querySelectorAll('.code-input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        // Init UI
        const h2 = document.querySelector('h2');
        h2.innerText = "Zkontrolujte svůj e-mail";

        async function verifyCode() {
            const enteredCode = Array.from(inputs).map(i => i.value).join('');
            if (enteredCode === tempUser.verificationCode) {
                const btn = document.querySelector('.btn-primary');
                btn.innerText = "Ověřování..."

                // Success! Create user in DATABASE via Server API
                try {
                    const response = await fetch('/api/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            username: tempUser.username,
                            email: tempUser.email,
                            password: tempUser.password // Sending raw pass, server handles hashing
                        })
                    });

                    const data = await response.json();

                    if (data.success) {
                        // Store session (only non-sensitive data)
                        localStorage.setItem('hackshield_user', JSON.stringify(data.user));
                        localStorage.removeItem('hackshield_temp_user');

                        btn.innerText = "Ověřeno! Vstupuji...";
                        btn.style.background = "#22c55e";

                        setTimeout(() => window.location.href = 'dashboard.html', 1000);
                    } else {
                        alert(data.message || "Chyba při vytváření účtu na serveru.");
                        btn.innerText = "Ověřit";
                    }
                } catch (err) {
                    console.error(err);
                    alert("Chyba spojení se serverem.");
                    btn.innerText = "Ověřit";
                }

            } else {
                alert("Nesprávný kód! Zkuste to znovu.");
                inputs.forEach(i => i.value = '');
                inputs[0].focus();
            }
        }

        function resendEmail() {
            const link = document.querySelector('a[onclick="resendEmail()"]');
            link.innerText = "Odesílám...";
            link.style.pointerEvents = "none";
            link.style.color = "var(--text-muted)";

            // 1. Generate New Code
            const newCode = Math.floor(100000 + Math.random() * 900000).toString();

            // 2. Update Storage (invalidates old code)
            tempUser.verificationCode = newCode;
            localStorage.setItem('hackshield_temp_user', JSON.stringify(tempUser));

            // 3. Send via EmailJS
            const templateParams = {
                to_email: tempUser.email,
                to_name: tempUser.username,
                code: newCode
            };

            emailjs.send('service_q5rgs6w', 'template_dqk6ayh', templateParams)
                .then(() => {
                    alert(`Nový kód byl odeslán na ${tempUser.email}`);
                    link.innerText = "Odeslat znovu (odesláno)";
                    setTimeout(() => {
                        link.innerText = "Odeslat znovu";
                        link.style.pointerEvents = "auto";
                        link.style.color = "#3b82f6"; // standard link color
                    }, 30000); // 30s cooldown
                })
                .catch((err) => {
                    console.error("EmailJS Error:", err);
                    alert("Chyba při odesílání emailu. Zkuste to za chvíli.");
                    link.innerText = "Odeslat znovu";
                    link.style.pointerEvents = "auto";
                    link.style.color = "#3b82f6";
                });
        }
    </script>
</body>

</html>
