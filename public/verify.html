<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ověření Emailu | HackShield</title>
    <link rel="stylesheet" href="style.css" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function () {
            emailjs.init("gUPFo7FLqNfZ8FEDf");
        })();
    </script>
    <style>
        body {
            overflow: hidden;
        }

        .code-inputs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 2rem 0;
        }

        .code-input {
            width: 50px;
            height: 60px;
            background: var(--bg-dark);
            border: 1px solid var(--border-soft);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1.5rem;
            text-align: center;
            font-family: var(--font-mono);
        }

        .code-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-soft);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            color: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 300px;
        }

        .toast.success {
            border-left: 4px solid #22c55e;
        }

        .toast.error {
            border-left: 4px solid #ef4444;
        }

        @keyframes slideIn {
            from {
                transform: translateX(120%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="bg-grid"></div>
    <div class="toast-container" id="toastContainer"></div>

    <div class="auth-container">
        <div class="auth-card" style="text-align: center;">
            <div
                style="width: 60px; height: 60px; margin: 0 auto 1.5rem; background: rgba(0, 212, 255, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--accent);">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                    <polyline points="22,6 12,13 2,6" />
                </svg>
            </div>

            <h2>Ověřte svůj email</h2>
            <p style="color: var(--text-secondary); margin-bottom: 2rem;">
                Zadali jsme kód na email <strong id="userEmail" class="text-accent">...</strong><br>
                Zadejte jej pro dokončení registrace.
            </p>

            <div class="code-inputs" id="otpContainer">
                <input type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="code-input" autofocus>
                <input type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="code-input">
                <input type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="code-input">
                <input type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="code-input">
                <input type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="code-input">
                <input type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="code-input">
            </div>

            <button onclick="verifyCode()" class="btn btn-primary"
                style="width: 100%; justify-content: center; margin-bottom: 1rem;">
                Ověřit
            </button>

            <p style="font-size: 0.85rem; color: var(--text-muted);">
                Nepřišel vám email? <a href="#" onclick="resendEmail()">Odeslat znovu</a>
            </p>
        </div>
    </div>

    <script>
        // Get temp user data
        const tempUser = JSON.parse(localStorage.getItem('hackshield_temp_user'));

        if (!tempUser) {
            window.location.href = 'register.html';
        }

        document.getElementById('userEmail').textContent = tempUser.email;

        // Auto-focus logic
        // --- CUSTOM TOAST SYSTEM ---
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = type === 'success' ? '✅' : '⚠️';
            toast.innerHTML = `<span style="font-size: 1.2rem;">${icon}</span> <span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // --- ENHANCED INPUT LOGIC ---
        const inputs = document.querySelectorAll('.code-input');

        // Handle Paste (Global for first input mostly)
        inputs[0].addEventListener('paste', handlePaste);

        function handlePaste(e) {
            e.preventDefault();
            const pasteData = (e.clipboardData || window.clipboardData).getData('text');
            const digits = pasteData.replace(/\D/g, '').split('').slice(0, 6);

            if (digits.length > 0) {
                digits.forEach((digit, i) => {
                    if (inputs[i]) inputs[i].value = digit;
                });
                if (digits.length === 6) {
                    inputs[5].focus();
                    // Optional: remove verifyCode() call if auto-submit is annoying
                    // verifyCode(); 
                } else {
                    inputs[Math.min(digits.length, 5)].focus();
                }
            }
        }

        inputs.forEach((input, index) => {
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace') {
                    if (input.value === '' && index > 0) inputs[index - 1].focus();
                } else if (e.key === 'Enter') {
                    verifyCode();
                } else if (e.key === 'ArrowLeft' && index > 0) {
                    inputs[index - 1].focus();
                } else if (e.key === 'ArrowRight' && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                } else if (!/^\d$/.test(e.key) && !['Tab', 'Delete', 'Backspace'].includes(e.key) && !e.ctrlKey) {
                    e.preventDefault();
                }
            });

            input.addEventListener('input', (e) => {
                input.value = input.value.replace(/[^0-9]/g, ''); // Ensure numbers
                if (input.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            // Redundant paste listener on all fields just in case
            input.addEventListener('paste', handlePaste);
        });

        // Init UI
        const h2 = document.querySelector('h2');
        h2.innerText = "Zkontrolujte svůj e-mail";

        async function verifyCode() {
            const enteredCode = Array.from(inputs).map(i => i.value).join('');
            if (enteredCode === tempUser.verificationCode) {
                const btn = document.querySelector('.btn-primary');
                btn.innerText = "Ověřování..."

                // Success! Create user in DATABASE via Server API
                try {
                    const response = await fetch('/api/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            username: tempUser.username,
                            email: tempUser.email,
                            password: tempUser.password // Sending raw pass, server handles hashing
                        })
                    });

                    const data = await response.json();

                    if (data.success) {
                        // Store session (only non-sensitive data)
                        localStorage.setItem('hackshield_user', JSON.stringify(data.user));
                        localStorage.removeItem('hackshield_temp_user');

                        btn.innerText = "Ověřeno! Vstupuji...";
                        btn.style.background = "#22c55e";
                        showToast("Registrace úspěšná! Vítejte.", "success");

                        setTimeout(() => window.location.href = 'dashboard.html', 1000);
                    } else {
                        showToast(data.message || "Chyba při vytváření účtu.", "error");
                        btn.innerText = "Ověřit";
                    }
                } catch (err) {
                    console.error(err);
                    showToast("Chyba spojení se serverem.", "error");
                    btn.innerText = "Ověřit";
                }

            } else {
                showToast("Nesprávný kód! Zkuste to znovu.", "error");
                inputs.forEach(i => i.value = '');
                inputs[0].focus();
            }
        }

        function resendEmail() {
            const link = document.querySelector('a[onclick="resendEmail()"]');
            link.innerText = "Odesílám...";
            link.style.pointerEvents = "none";
            link.style.color = "var(--text-muted)";

            // 1. Generate New Code
            const newCode = Math.floor(100000 + Math.random() * 900000).toString();

            // 2. Update Storage (invalidates old code)
            tempUser.verificationCode = newCode;
            localStorage.setItem('hackshield_temp_user', JSON.stringify(tempUser));

            // 3. Send via EmailJS
            const templateParams = {
                to_email: tempUser.email,
                to_name: tempUser.username,
                code: newCode
            };

            emailjs.send('service_q5rgs6w', 'template_dqk6ayh', templateParams)
                .then(() => {
                    showToast(`Nový kód odeslán na ${tempUser.email}`, 'success');
                    link.innerText = "Odeslat znovu (odesláno)";
                    setTimeout(() => {
                        link.innerText = "Odeslat znovu";
                        link.style.pointerEvents = "auto";
                        link.style.color = "var(--accent)";
                    }, 30000); // 30s cooldown
                })
                .catch((err) => {
                    console.error("EmailJS Error:", err);
                    showToast("Chyba při odesílání emailu.", "error");
                    link.innerText = "Odeslat znovu";
                    link.style.pointerEvents = "auto";
                    link.style.color = "var(--accent)";
                });
        }
    </script>
</body>

</html>
