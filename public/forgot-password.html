<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Obnovení hesla | HackShield</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function () {
            // Stejný Public Key jako u registrace
            emailjs.init("gUPFo7FLqNfZ8FEDf");
        })();
    </script>
    <style>
        body {
            overflow: hidden;
        }

        .slide-up {
            animation: slideUp 0.5s ease forwards;
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="bg-grid"></div>

    <div class="auth-container">
        <!-- STEP 1: Email Form -->
        <div id="step1" class="auth-card slide-up">
            <div style="text-align: center; margin-bottom: 2rem;">
                <h2>Zapomenuté heslo?</h2>
                <p style="color: var(--text-secondary);">Zadej svůj e-mail pro obnovu.</p>
            </div>
            <form onsubmit="sendResetCode(event)">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="resetEmail" class="form-input" placeholder="name@example.com" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
                    Odeslat kód
                </button>
            </form>
            <div class="form-footer">
                <a href="login.html">Zpět na přihlášení</a>
            </div>
        </div>

        <!-- STEP 2: Code & New Password -->
        <div id="step2" class="auth-card slide-up" style="display: none;">
            <div style="text-align: center; margin-bottom: 1.5rem;">
                <h2>Nové heslo</h2>
                <p style="color: var(--text-secondary);">Kód byl odeslán na tvůj e-mail.</p>
            </div>
            <form onsubmit="handlePasswordReset(event)">
                <div class="form-group">
                    <label class="form-label">Ověřovací kód</label>
                    <input type="text" id="verificationCode" class="form-input" placeholder="123456" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Nové heslo</label>
                    <input type="password" id="newPassword" class="form-input" placeholder="••••••••" required
                        minlength="6">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
                    Změnit heslo
                </button>
            </form>
        </div>
    </div>

    <script>
        // KONFIGURACE PRO EMAILJS (Zde vlož své ID šablony pro reset hesla)
        const RESET_TEMPLATE_ID = 'template_RESET_PASS';

        let generatedCode = null;
        let userEmail = null;

        async function sendResetCode(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const email = document.getElementById('resetEmail').value;
            userEmail = email;

            btn.innerText = "Ověřuji email...";

            // Check if user actually exists on server first
            try {
                const checkRes = await fetch('/api/check-user', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });
                const checkData = await checkRes.json();

                if (!checkData.exists) {
                    alert("Tento email v databázi neexistuje.");
                    btn.innerText = "Odeslat kód";
                    return;
                }

                // Generate Code & Send Email
                btn.innerText = "Odesílám...";
                generatedCode = Math.floor(100000 + Math.random() * 900000).toString();

                const templateParams = {
                    to_email: email,
                    code: generatedCode
                };

                emailjs.send('service_q5rgs6w', RESET_TEMPLATE_ID, templateParams)
                    .then(() => {
                        document.getElementById('step1').style.display = 'none';
                        document.getElementById('step2').style.display = 'block';
                    }, (err) => {
                        console.error(err);
                        alert("Chyba odesílání emailu. Zkontrolujte ID šablony v kódu.");
                    });

            } catch (err) {
                alert("Chyba serveru.");
            }
        }

        async function handlePasswordReset(e) {
            e.preventDefault();
            const code = document.getElementById('verificationCode').value;
            const newPass = document.getElementById('newPassword').value;
            const btn = e.target.querySelector('button');

            if (code !== generatedCode) {
                alert("Špatný kód!");
                return;
            }

            btn.innerText = "Ukládám...";

            try {
                // Call Server API to update password
                const res = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail, newPassword: newPass })
                });

                const data = await res.json();
                if (data.success) {
                    alert("Heslo úspěšně změněno! Nyní se můžeš přihlásit.");
                    window.location.href = 'login.html';
                } else {
                    alert("Chyba: " + data.message);
                }
            } catch (e) {
                alert("Chyba spojení se serverem.");
            }
        }
    </script>
</body>

</html>
