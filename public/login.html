<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Přihlášení | HackShield</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            overflow: hidden;
        }

        .error-msg {
            color: var(--danger);
            font-size: 0.85rem;
            margin-top: 5px;
            display: none;
            text-align: center;
            margin-bottom: 1rem;
        }

        .auth-card h2 {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a0b8d8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-logo-box {
            width: 56px;
            height: 56px;
            margin: 0 auto 1.5rem;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid var(--border-glass);
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.15);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border-soft);
        }
    </style>
    <script>
        function checkAuth() {
            if (localStorage.getItem('hackshield_user')) {
                window.location.replace('dashboard.html');
            }
        }
        checkAuth();

        window.addEventListener('pageshow', (event) => {
            if (event.persisted || localStorage.getItem('hackshield_user')) {
                checkAuth();
            }
            const btn = document.querySelector('button[type="submit"]');
            if (btn) {
                btn.innerText = "Přihlásit se";
                btn.disabled = false;
                btn.style.opacity = "1";
            }
        });
    </script>
</head>

<body>
    <div class="bg-grid"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div style="text-align: center; margin-bottom: 2rem;">
                <div class="auth-logo-box">
                    <img src="assets/fotka.png" alt="HackShield" style="width: 100%; height: 100%; object-fit: cover;">
                </div>
                <h2>Vítejte zpět</h2>
                <p style="color: var(--text-secondary); margin-top: 0.5rem; font-size: 0.95rem;">Přihlaste se do svého vzdělávacího centra.</p>
            </div>

            <div id="loginError" class="error-msg">Nesprávné jméno nebo heslo.</div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">Email nebo uživatelské jméno</label>
                    <input type="text" id="loginInput" class="form-input" placeholder="hacker@hackshield.cz" required>
                </div>

                <div class="form-group">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                        <label class="form-label" style="margin-bottom: 0;">Heslo</label>
                        <a href="forgot-password.html" style="font-size: 0.8rem; color: var(--accent);">Zapomněli jste
                            heslo?</a>
                    </div>
                    <input type="password" id="passwordInput" class="form-input" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary"
                    style="width: 100%; justify-content: center; padding: 0.8rem;">
                    Přihlásit se
                </button>
            </form>

            <div class="divider">Nebo</div>

            <!-- GOOGLE SIGN IN -->
            <script src="https://accounts.google.com/gsi/client" async defer></script>
            <div class="g_id_signin" style="display: flex; justify-content: center; margin-bottom: 1rem;"></div>
            <script>
                window.addEventListener('load', async () => {
                    try {
                        const res = await fetch('/api/config');
                        const config = await res.json();
                        
                        if (config.GOOGLE_CLIENT_ID && typeof google !== 'undefined') {
                            google.accounts.id.initialize({
                                client_id: config.GOOGLE_CLIENT_ID,
                                context: "signin",
                                callback: handleGoogleAuth
                            });
                            
                            google.accounts.id.renderButton(
                                document.querySelector('.g_id_signin'),
                                { theme: "outline", size: "large", text: "signin_with", shape: "rectangular", logo_alignment: "left" }
                            );
                        } else {
                            document.querySelector('.g_id_signin').innerHTML = '<span style="color:var(--text-muted); font-size:0.8rem;">Google přihlášení není nakonfigurováno.</span>';
                        }
                    } catch (e) {
                        console.error("Google init failed", e);
                    }
                });
            </script>

            <div class="form-footer">
                Nemáte ještě účet? <a href="register.html">Vytvořit účet</a>
            </div>
        </div>
    </div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const loginInput = document.getElementById('loginInput').value;
            const passwordInput = document.getElementById('passwordInput').value;
            const errorMsg = document.getElementById('loginError');

            errorMsg.style.display = 'none';
            btn.innerText = "Ověřování...";
            btn.style.opacity = "0.7";

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ loginInput, password: passwordInput })
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('hackshield_user', JSON.stringify(data.user));

                    btn.innerText = "Úspěch! Přesměrování...";
                    btn.style.background = "linear-gradient(135deg, #22c55e, #10b981)";
                    btn.style.color = "white";

                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 800);
                } else {
                    throw new Error(data.message || 'Login failed');
                }
            } catch (err) {
                console.error(err);
                btn.innerText = "Přihlásit se";
                btn.style.opacity = "1";
                errorMsg.innerText = "Nesprávné jméno nebo heslo.";
                errorMsg.style.display = 'block';
            }
        }

        async function handleGoogleAuth(response) {
            const errorMsg = document.getElementById('loginError');
            errorMsg.style.display = 'none';

            try {
                const res = await fetch('/api/auth/google', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ credential: response.credential })
                });

                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('hackshield_user', JSON.stringify(data.user));
                    
                    document.querySelector('.auth-card h2').innerText = "Úspěch!";
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 800);
                } else {
                    throw new Error(data.message || 'Google Auth failed');
                }
            } catch (err) {
                console.error(err);
                errorMsg.innerText = "Google přihlášení selhalo.";
                errorMsg.style.display = 'block';
            }
        }
    </script>
</body>

</html>
