<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Panel | HackShield</title>
    <link rel="stylesheet" href="style.css" />
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 5%;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
        }

        .admin-content {
            padding: 2rem 5%;
        }

        .user-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
        }

        .user-table th,
        .user-table td {
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .user-table th {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            font-weight: 500;
        }

        .badge-pill {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-right: 4px;
            font-weight: bold;
        }

        .badge-admin {
            background: rgba(234, 67, 53, 0.2);
            color: #ea4335;
            border: 1px solid rgba(234, 67, 53, 0.3);
        }

        .badge-user {
            background: rgba(34, 197, 94, 0.1);
            color: #86efac;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .action-btn {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.8rem;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .action-btn.delete {
            border-color: rgba(234, 67, 53, 0.5);
            color: #fca5a5;
        }

        .action-btn.delete:hover {
            background: rgba(234, 67, 53, 0.2);
        }
    </style>
</head>

<body>
    <div class="bg-grid"></div>

    <div class="admin-header">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <div style="width: 40px; height: 40px; border-radius: 8px; overflow: hidden;">
                <img src="assets/fotka.png" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
            <div>
                <div style="font-weight: bold; font-family: var(--font-mono); color: var(--danger);">[ADMIN TERMINAL]
                </div>
                <div style="font-size: 0.85rem; color: var(--text-secondary);">Správa uživatelů a systému</div>
            </div>
        </div>
        <a href="dashboard.html" class="btn btn-outline">Zpět na Dashboard</a>
    </div>

    <div class="admin-content">
        <!-- Manual User Creation -->
        <div
            style="background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(124, 242, 107, 0.2); border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem;">
            <h3 style="margin-bottom: 1rem; color: var(--accent);">⚡ Rychlá registrace uživatele</h3>
            <form onsubmit="adminCreateUser(event)"
                style="display: flex; gap: 1rem; flex-wrap: wrap; align-items: flex-end;">
                <div style="flex: 1; min-width: 200px;">
                    <label
                        style="font-size: 0.8rem; color: var(--text-muted); display: block; margin-bottom: 0.4rem;">Jméno</label>
                    <input type="text" id="newUsername" class="form-input" placeholder="User" required
                        style="margin:0;">
                </div>
                <div style="flex: 1; min-width: 200px;">
                    <label
                        style="font-size: 0.8rem; color: var(--text-muted); display: block; margin-bottom: 0.4rem;">Email</label>
                    <input type="email" id="newEmail" class="form-input" placeholder="email@hack.com" required
                        style="margin:0;">
                </div>
                <div style="flex: 1; min-width: 200px;">
                    <label
                        style="font-size: 0.8rem; color: var(--text-muted); display: block; margin-bottom: 0.4rem;">Heslo</label>
                    <input type="text" id="newPassword" class="form-input" placeholder="password" required
                        style="margin:0;">
                </div>
                <div style="width: 120px;">
                    <label
                        style="font-size: 0.8rem; color: var(--text-muted); display: block; margin-bottom: 0.4rem;">Role</label>
                    <select id="newRole" class="form-input" style="margin:0;">
                        <option value="User">Student</option>
                        <option value="Admin">Admin</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="height: 42px;">Vytvořit</button>
            </form>
        </div>

        <h2 style="margin-bottom: 1.5rem;">Registrovaní uživatelé databáze</h2>

        <div style="overflow-x: auto;">
            <table class="user-table">
                <thead>
                    <tr>
                        <th>Uživatel</th>
                        <th>Email</th>
                        <th>Level</th>
                        <th>Role / Odznaky</th>
                        <th>Datum registrace</th>
                        <th>Akce</th>
                    </tr>
                </thead>
                <tbody id="userTableBody">
                    <!-- Javascript will populate this -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // AUTH GUARD: Only Admins Allowed!
        const currentUser = JSON.parse(localStorage.getItem('hackshield_user'));
        if (!currentUser || !currentUser.badges.includes('Admin')) {
            window.location.href = 'dashboard.html'; // Kick out non-admins
        }

        async function renderUsers() {
            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">Načítám data...</td></tr>';

            try {
                const response = await fetch('/api/users');
                const users = await response.json();

                tbody.innerHTML = '';
                users.forEach((user) => {
                    const tr = document.createElement('tr');

                    const badgesHtml = user.badges.map(b => {
                        const cls = b === 'Admin' ? 'badge-admin' : 'badge-user';
                        return `<span class="badge-pill ${cls}">${b}</span>`;
                    }).join('');

                    const joinedDate = user.joined_date ? new Date(user.joined_date).toLocaleDateString('cs-CZ') : 'Neznámo';

                    const isAdmin = user.badges.includes('Admin');
                    const roleActionText = isAdmin ? 'Odebrat Admin' : 'Přidat Admin';
                    const roleActionStyle = isAdmin ? 'border-color: #f1f5f9; color: #f1f5f9; margin-left: 5px;' : 'border-color: #facc15; color: #facc15; margin-left: 5px;';

                    tr.innerHTML = `
                        <td style="font-weight: bold; color: white;">${user.username}</td>
                        <td style="font-family: var(--font-mono); font-size: 0.9rem; color: var(--text-secondary);">${user.email}</td>
                        <td><span style="color: var(--accent);">Lvl ${user.level}</span></td>
                        <td>${badgesHtml}</td>
                        <td style="color: var(--text-secondary); font-size: 0.9rem;">${joinedDate}</td>
                        <td>
                            ${user.username !== currentUser.username ?
                            `<button onclick="deleteUser(${user.id})" class="action-btn delete">Smazat</button>
                             <button onclick="toggleAdmin(${user.id}, ${isAdmin})" class="action-btn" style="${roleActionStyle}">${roleActionText}</button>` :
                            '<span style="opacity:0.5; font-size:0.8rem;">(Ty)</span>'}
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:red;">Chyba načítání dat.</td></tr>';
            }
        }

        async function deleteUser(id) {
            if (confirm("Opravdu chceš smazat tohoto uživatele? Tato akce je nevratná.")) {
                await fetch(`/api/users/${id}`, { method: 'DELETE' });
                renderUsers();
            }
        }

        async function toggleAdmin(id, wasAdmin) {
            await fetch('/api/users/toggle-role', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, isAdmin: wasAdmin })
            });
            renderUsers();
        }

        async function adminCreateUser(e) {
            e.preventDefault();

            const username = document.getElementById('newUsername').value;
            const email = document.getElementById('newEmail').value;
            const password = document.getElementById('newPassword').value;
            // Role selection logic can be handled by just creating user then toggling, or updating register API.
            // For simplicity, we just create a standard user here via Register API, then upgrade if needed?
            // Actually, we can just use the standard Register API but ignore the response login token.

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();
                if (data.success) {
                    // Check if role selected was Admin
                    const role = document.getElementById('newRole').value;
                    if (role === 'Admin') {
                        // Upgrade immediately
                        await fetch('/api/users/toggle-role', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ id: data.user.id, isAdmin: false }) // false means "was not admin", so upgrade
                        });
                    }
                    e.target.reset();
                    renderUsers();
                    alert(`Uživatel ${username} vytvořen!`);
                } else {
                    alert(data.message);
                }
            } catch (e) { console.error(e); }
        }

        renderUsers();
    </script>
</body>

</html>
