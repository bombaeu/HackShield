<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HackShield | Žebříček</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        .app-layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            min-height: 100vh;
        }

        .sidebar {
            background: rgba(8, 12, 28, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-soft);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 2.5rem;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .sidebar-brand .brand-name {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .nav-group { margin-bottom: 2rem; }
        .nav-label { font-size: 0.72rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.8rem; letter-spacing: 0.08em; font-weight: 600; }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            margin-bottom: 0.2rem;
            transition: all var(--transition-fast);
            text-decoration: none;
        }

        .sidebar-link:hover, .sidebar-link.active { background: rgba(0, 212, 255, 0.06); color: white; }
        .sidebar-link.active { border-left: 3px solid var(--accent); color: var(--accent); }

        .app-main { padding: 2rem; }

        .app-main header h2 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a0b8d8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ─── PODIUM ─── */
        .podium {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 1.5rem;
            padding: 2rem 0 3rem;
        }

        .podium-place {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .podium-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.2rem;
            color: white;
        }

        .podium-1 .podium-avatar { background: linear-gradient(135deg, #FFD700, #FFA500); width: 72px; height: 72px; font-size: 1.5rem; box-shadow: 0 0 30px rgba(255, 215, 0, 0.3); }
        .podium-2 .podium-avatar { background: linear-gradient(135deg, #C0C0C0, #8a8a8a); box-shadow: 0 0 20px rgba(192, 192, 192, 0.2); }
        .podium-3 .podium-avatar { background: linear-gradient(135deg, #CD7F32, #a0622a); box-shadow: 0 0 20px rgba(205, 127, 50, 0.2); }

        .podium-name { font-weight: 700; font-size: 0.9rem; }
        .podium-xp { font-size: 0.78rem; color: var(--text-muted); }
        .podium-medal { font-size: 1.5rem; }
        .podium-1 .podium-medal { font-size: 2rem; }

        .podium-bar {
            width: 80px;
            border-radius: 8px 8px 0 0;
            background: var(--bg-panel);
            border: 1px solid var(--border-glass);
            border-bottom: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: var(--text-muted);
        }

        .podium-1 .podium-bar { height: 100px; background: linear-gradient(180deg, rgba(255, 215, 0, 0.1), var(--bg-panel)); }
        .podium-2 .podium-bar { height: 70px; }
        .podium-3 .podium-bar { height: 50px; }

        /* Table */
        .rank-1 { color: #FFD700; font-weight: bold; }
        .rank-2 { color: #C0C0C0; font-weight: bold; }
        .rank-3 { color: #CD7F32; font-weight: bold; }

        .role-badge {
            font-size: 0.72rem;
            padding: 3px 8px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.06);
            font-weight: 600;
        }

        .role-root { color: #ff4d6a; background: rgba(255, 77, 106, 0.1); border: 1px solid rgba(255, 77, 106, 0.2); }
        .role-admin { color: #ff4d6a; background: rgba(255, 77, 106, 0.1); }
        .role-student { color: var(--accent); background: rgba(0, 212, 255, 0.08); }

        .user-table tr { transition: background var(--transition-fast); }
        .user-table tr:hover { background: rgba(0, 212, 255, 0.03); }

        /* Responsive */
        @media (max-width: 768px) {
            .app-layout { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }

            .sidebar {
                display: flex !important;
                flex-direction: column;
                padding: 1rem;
                border-right: none;
                border-bottom: 1px solid var(--border-soft);
            }

            .sidebar-brand { margin-bottom: 1rem; justify-content: center; }
            .sidebar nav { display: flex; gap: 1rem; overflow-x: auto; padding-bottom: 0.5rem; }
            .nav-group { display: flex; gap: 0.5rem; margin-bottom: 0; }
            .nav-label { display: none; }

            .sidebar-link {
                white-space: nowrap; font-size: 0.85rem; padding: 0.6rem;
                background: var(--bg-card); border: 1px solid var(--border-soft);
            }

            .sidebar-user { display: none; }
            main { padding: 1.5rem !important; }
            .podium { gap: 0.8rem; }
            .podium-bar { width: 60px; }
        }
    </style>
</head>

<body style="opacity: 0; transition: opacity 0.5s;">

    <div class="app-layout">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <a href="index.html" class="sidebar-brand" style="text-decoration: none; color: white;">
                <div style="width: 32px; height: 32px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border-glass);">
                    <img src="assets/fotka.png" alt="HS" style="width: 100%; height: 100%; object-fit: cover;">
                </div>
                <span class="brand-name">HackShield</span>
            </a>

            <div class="nav-group">
                <div class="nav-label">Menu</div>
                <a href="dashboard.html" class="sidebar-link"><span>Dashboard</span></a>
                <a href="learn.html" class="sidebar-link"><span>Learn</span></a>
                <a href="leaderboard.html" class="sidebar-link active"><span>Žebříček</span></a>
                <a href="#" class="sidebar-link"><span>Network</span></a>
            </div>

            <div style="margin-top: auto;">
                <a href="#" onclick="logout()" class="sidebar-link" style="color: var(--danger);">
                    <span>Odhlásit se</span>
                </a>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="app-main">
            <header style="margin-bottom: 2rem;">
                <h2>Síň Slávy</h2>
                <p style="color: var(--text-muted);">Nejlepší hackeři v systému.</p>
            </header>

            <!-- PODIUM -->
            <div id="podiumContainer" class="podium" style="display: none;"></div>

            <div class="widget">
                <div class="table-responsive">
                    <table class="user-table" style="width: 100%; border-collapse: collapse;">
                        <thead>
                            <tr style="text-align: left; border-bottom: 1px solid var(--border-soft);">
                                <th style="padding: 1rem; font-size: 0.82rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em;">#</th>
                                <th style="padding: 1rem; font-size: 0.82rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em;">Hacker</th>
                                <th style="padding: 1rem; font-size: 0.82rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em;">Role</th>
                                <th style="padding: 1rem; font-size: 0.82rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em;">Level</th>
                                <th style="padding: 1rem; font-size: 0.82rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em;">Streak 🔥</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboardBody">
                            <tr>
                                <td colspan="5" style="padding:1rem; text-align:center;">Načítám data...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <!-- Mobile Bottom Nav -->
    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            <span>Domů</span>
        </a>
        <a href="learn.html" class="nav-item">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
            </svg>
            <span>Kurzy</span>
        </a>
        <a href="leaderboard.html" class="nav-item active">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="20" x2="18" y2="10"></line>
                <line x1="12" y1="20" x2="12" y2="4"></line>
                <line x1="6" y1="20" x2="6" y2="14"></line>
            </svg>
            <span>Žebříček</span>
        </a>
        <a href="#" onclick="logout()" class="nav-item">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
            <span>Odhlásit</span>
        </a>
    </nav>

    <script>
        // Auth Check & Security Validation
        async function checkAuth() {
            const user = JSON.parse(localStorage.getItem('hackshield_user'));
            if (!user || !user.id) {
                window.location.href = 'login.html';
                return;
            }

            try {
                const res = await fetch(`/api/user/${user.id}`);
                if (res.status === 404) {
                    logout();
                    return;
                }
            } catch (e) {
                console.warn("Auth check failed (offline?)");
            }

            document.body.style.opacity = '1';
            loadLeaderboard();
        }

        checkAuth();

        async function loadLeaderboard() {
            try {
                const res = await fetch('/api/leaderboard');
                const data = await res.json();

                const localUser = JSON.parse(localStorage.getItem('hackshield_user')) || {};

                // Build Podium (top 3)
                if (data.length >= 3) {
                    const podium = document.getElementById('podiumContainer');
                    const medals = ['🥇', '🥈', '🥉'];
                    const order = [1, 0, 2]; // Silver, Gold, Bronze — visual layout

                    podium.innerHTML = order.map(i => {
                        const u = data[i];
                        const placeClass = `podium-${i + 1}`;
                        return `
                            <div class="podium-place ${placeClass}">
                                <div class="podium-medal">${medals[i]}</div>
                                <div class="podium-avatar">${u.username.charAt(0).toUpperCase()}</div>
                                <div class="podium-name">${u.username}</div>
                                <div class="podium-xp">${u.xp} XP • Lvl ${u.level}</div>
                                <div class="podium-bar"></div>
                            </div>
                        `;
                    }).join('');
                    podium.style.display = 'flex';
                }

                // Build Table
                const tbody = document.getElementById('leaderboardBody');
                tbody.innerHTML = "";

                data.forEach((u, index) => {
                    const rank = index + 1;
                    let rankClass = "";
                    if (rank === 1) rankClass = "rank-1";
                    if (rank === 2) rankClass = "rank-2";
                    if (rank === 3) rankClass = "rank-3";

                    let roleClass = "role-student";
                    if (u.role === 'Root') roleClass = "role-root";
                    if (u.role === 'Admin') roleClass = "role-admin";

                    const isMe = (u.username === localUser.username) ? "background: rgba(0, 212, 255, 0.04);" : "";

                    tbody.innerHTML += `
                        <tr style="border-bottom: 1px solid var(--border-soft); ${isMe}">
                            <td style="padding: 1rem;" class="${rankClass}">#${rank}</td>
                            <td style="padding: 1rem; font-weight: 600;">
                                ${u.username} 
                                ${u.badgesCount > 5 ? '🎖️' : ''}
                            </td>
                            <td style="padding: 1rem;">
                                <span class="role-badge ${roleClass}">${u.role}</span>
                            </td>
                            <td style="padding: 1rem; font-weight: bold; color: var(--accent);">
                                ${u.level}
                                <span style="font-size:0.8em; color:var(--text-muted); margin-left:5px;">(${u.xp} XP)</span>
                            </td>
                            <td style="padding: 1rem;">${u.streak} 🔥</td>
                        </tr>
                    `;
                });

            } catch (e) {
                console.error(e);
                document.getElementById('leaderboardBody').innerHTML = '<tr><td colspan="5" style="text-align:center;">Chyba načítání dat.</td></tr>';
            }
        }

        function logout() {
            localStorage.removeItem('hackshield_user');
            window.location.href = 'index.html';
        }


    </script>
</body>

</html>
