<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HackShield | Žebříček</title>
    <link rel="stylesheet" href="style.css" />
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        .app-layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            min-height: 100vh;
        }

        /* Sidebar Base */
        .sidebar {
            background: var(--bg-panel);
            border-right: 1px solid var(--border-soft);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            /* Sticky Navigation */
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 2.5rem;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .nav-group {
            margin-bottom: 2rem;
        }

        .nav-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.8rem;
            letter-spacing: 0.05em;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem;
            border-radius: 8px;
            color: var(--text-secondary);
            margin-bottom: 0.2rem;
            transition: all 0.2s;
            text-decoration: none;
        }

        .sidebar-link:hover,
        .sidebar-link.active {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .sidebar-link.active {
            border-left: 3px solid var(--accent);
        }

        /* Main Content */
        .app-main {
            padding: 2rem;
        }

        /* Leaderboard Table Styles */
        .rank-1 {
            color: #FFD700;
            font-weight: bold;
        }

        /* Gold */
        .rank-2 {
            color: #C0C0C0;
            font-weight: bold;
        }

        /* Silver */
        .rank-3 {
            color: #CD7F32;
            font-weight: bold;
        }

        /* Bronze */

        .role-badge {
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.1);
        }

        .role-root {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .role-admin {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        .role-student {
            color: var(--accent);
            background: rgba(124, 242, 107, 0.1);
        }

        /* Responsive Overrides */
        @media (max-width: 768px) {
            .app-layout {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
            }

            .sidebar {
                display: flex !important;
                flex-direction: column;
                padding: 1rem;
                border-right: none;
                border-bottom: 1px solid var(--border-soft);
            }

            .sidebar-brand {
                margin-bottom: 1rem;
                justify-content: center;
            }

            .sidebar nav {
                display: flex;
                gap: 1rem;
                overflow-x: auto;
                padding-bottom: 0.5rem;
            }

            .nav-group {
                display: flex;
                gap: 0.5rem;
                margin-bottom: 0;
            }

            .nav-label {
                display: none;
            }

            .sidebar-link {
                white-space: nowrap;
                font-size: 0.85rem;
                padding: 0.6rem;
                background: var(--bg-card);
                border: 1px solid var(--border-soft);
            }

            .sidebar-user {
                display: none;
            }

            main {
                padding: 1.5rem !important;
            }
        }
    </style>
</head>

<body style="opacity: 0; transition: opacity 0.5s;">

    <div class="app-layout">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <a href="index.html" class="sidebar-brand" style="text-decoration: none; color: white;">
                <div
                    style="width: 32px; height: 32px; border-radius: 8px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1);">
                    <img src="assets/fotka.png" alt="HS" style="width: 100%; height: 100%; object-fit: cover;">
                </div>
                HackShield
            </a>

            <div class="nav-group">
                <div class="nav-label">Menu</div>
                <a href="dashboard.html" class="sidebar-link">
                    <span>Dashboard</span>
                </a>
                <a href="learn.html" class="sidebar-link">
                    <span>Learn</span>
                </a>
                <a href="leaderboard.html" class="sidebar-link active">
                    <span>Žebříček</span>
                </a>
                <a href="#" class="sidebar-link">
                    <span>Network</span>
                </a>
            </div>

            <div style="margin-top: auto;">
                <a href="#" onclick="logout()" class="sidebar-link" style="color: var(--danger);">
                    <span>Odhlásit se</span>
                </a>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="app-main">
            <header style="margin-bottom: 2rem;">
                <h2>Síň Slávy</h2>
                <p style="color: var(--text-muted);">Nejlepší hackeři v systému.</p>
            </header>

            <div class="widget">
                <div class="table-responsive">
                    <table class="user-table" style="width: 100%; border-collapse: collapse;">
                        <thead>
                            <tr style="text-align: left; border-bottom: 1px solid var(--border-soft);">
                                <th style="padding: 1rem;">#</th>
                                <th style="padding: 1rem;">Hacker</th>
                                <th style="padding: 1rem;">Role</th>
                                <th style="padding: 1rem;">Level</th>
                                <th style="padding: 1rem;">Streak 🔥</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboardBody">
                            <tr>
                                <td colspan="5" style="padding:1rem; text-align:center;">Načítám data...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <!-- Mobile Bottom Nav -->
    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            <span>Domů</span>
        </a>
        <a href="learn.html" class="nav-item">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
            </svg>
            <span>Kurzy</span>
        </a>
        <a href="leaderboard.html" class="nav-item active">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="20" x2="18" y2="10"></line>
                <line x1="12" y1="20" x2="12" y2="4"></line>
                <line x1="6" y1="20" x2="6" y2="14"></line>
            </svg>
            <span>Žebříček</span>
        </a>
        <a href="#" onclick="logout()" class="nav-item">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
            <span>Odhlásit</span>
        </a>
    </nav>

    <script>
        // Auth Check & Security Validation
        async function checkAuth() {
            const user = JSON.parse(localStorage.getItem('hackshield_user'));
            if (!user || !user.id) {
                window.location.href = 'login.html';
                return;
            }

            // Verify existence on server
            try {
                const res = await fetch(`/api/user/${user.id}`);
                if (res.status === 404) {
                    logout(); // User deleted
                    return;
                }
            } catch (e) {
                console.warn("Auth check failed (offline?)");
            }

            // Show UI
            document.body.style.opacity = '1';
            loadLeaderboard(); // Load data after auth check
        }

        // Removed explicit loadLeaderboard() call at bottom, moved here
        checkAuth();

        async function loadLeaderboard() {
            try {
                const res = await fetch('/api/leaderboard');
                const data = await res.json();

                const localUser = JSON.parse(localStorage.getItem('hackshield_user')) || {};

                const tbody = document.getElementById('leaderboardBody');
                tbody.innerHTML = "";

                data.forEach((u, index) => {
                    const rank = index + 1;
                    let rankClass = "";
                    if (rank === 1) rankClass = "rank-1";
                    if (rank === 2) rankClass = "rank-2";
                    if (rank === 3) rankClass = "rank-3";

                    let roleClass = "role-student";
                    if (u.role === 'Root') roleClass = "role-root";
                    if (u.role === 'Admin') roleClass = "role-admin";

                    /* Highlight current user */
                    const isMe = (u.username === localUser.username) ? "background: rgba(255,255,255,0.05);" : "";

                    tbody.innerHTML += `
                        <tr style="border-bottom: 1px solid var(--border-soft); ${isMe}">
                            <td style="padding: 1rem;" class="${rankClass}">#${rank}</td>
                            <td style="padding: 1rem; font-weight: 500;">
                                ${u.username} 
                                ${u.badgesCount > 5 ? '🎖️' : ''}
                            </td>
                            <td style="padding: 1rem;">
                                <span class="role-badge ${roleClass}">${u.role}</span>
                            </td>
                            <td style="padding: 1rem; font-weight: bold; color: var(--accent);">
                                ${u.level}
                                <span style="font-size:0.8em; color:var(--text-muted); margin-left:5px;">(${u.xp} XP)</span>
                            </td>
                            <td style="padding: 1rem;">${u.streak} 🔥</td>
                        </tr>
                    `;
                });

            } catch (e) {
                console.error(e);
                document.getElementById('leaderboardBody').innerHTML = '<tr><td colspan="5" style="text-align:center;">Chyba načítání dat.</td></tr>';
            }
        }

        function logout() {
            localStorage.removeItem('hackshield_user');
            window.location.href = 'index.html';
        }


    </script>
</body>

</html>
