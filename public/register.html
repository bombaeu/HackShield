<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Registrace | HackShield</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function () {
            emailjs.init("gUPFo7FLqNfZ8FEDf");
        })();
    </script>
    <style>
        body {
            overflow: hidden;
        }

        .error-msg {
            color: var(--danger);
            font-size: 0.85rem;
            margin-top: 5px;
            display: none;
        }

        .auth-card h2 {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a0b8d8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-logo-box {
            width: 56px;
            height: 56px;
            margin: 0 auto 1.5rem;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid var(--border-glass);
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.15);
        }
    </style>
    <script>
        function checkAuth() {
            if (localStorage.getItem('hackshield_user')) {
                window.location.replace('dashboard.html');
            }
        }
        checkAuth();

        window.addEventListener('pageshow', (event) => {
            if (event.persisted || localStorage.getItem('hackshield_user')) {
                checkAuth();
            }
            const btn = document.querySelector('button[type="submit"]');
            if (btn) {
                btn.innerText = "Registrovat se";
                btn.style.opacity = "1";
            }
        });
    </script>
</head>

<body>
    <div class="bg-grid"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div style="text-align: center; margin-bottom: 2rem;">
                <div class="auth-logo-box">
                    <img src="assets/fotka.png" alt="HackShield" style="width: 100%; height: 100%; object-fit: cover;">
                </div>
                <h2>Vytvořit účet</h2>
                <p style="color: var(--text-secondary); margin-top: 0.5rem; font-size: 0.95rem;">Přidej se k elitní komunitě.</p>
            </div>

            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label class="form-label">Uživatelské jméno</label>
                    <input type="text" id="username" class="form-input" placeholder="HackerName" required minlength="3">
                    <div id="userError" class="error-msg">Toto jméno je již obsazené.</div>
                </div>

                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="name@example.com" required>
                    <div id="emailError" class="error-msg">Tento email je již registrován.</div>
                </div>

                <div class="form-group">
                    <label class="form-label">Heslo</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required
                        minlength="6">
                </div>

                <div class="form-group">
                    <label class="form-label">Potvrzení hesla</label>
                    <input type="password" id="confirmPassword" class="form-input" placeholder="••••••••" required>
                    <div id="passwordError" class="error-msg">Hesla se neshodují.</div>
                </div>

                <div class="form-group" style="display: flex; align-items: start; gap: 0.8rem; margin-bottom: 1.5rem;">
                    <input type="checkbox" id="termsCheck" required
                        style="width: 18px; height: 18px; margin-top: 2px; accent-color: var(--accent); cursor: pointer;">
                    <label for="termsCheck"
                        style="font-size: 0.9rem; color: var(--text-secondary); cursor: pointer; line-height: 1.4;">
                        Souhlasím s <a href="terms.html" target="_blank" class="text-accent"
                            style="text-decoration: underline;">podmínkami užití</a> a beru na vědomí vzdělávací povahu
                        platformy.
                    </label>
                </div>

                <button type="submit" class="btn btn-primary"
                    style="width: 100%; justify-content: center; padding: 0.8rem;">
                    Registrovat se
                </button>
            </form>

            <div class="divider" style="display:flex; align-items:center; gap:1rem; margin:1.5rem 0; color:var(--text-muted); font-size:0.8rem;">
                <div style="flex:1; height:1px; background:var(--border-soft);"></div>
                Nebo
                <div style="flex:1; height:1px; background:var(--border-soft);"></div>
            </div>

            <!-- GOOGLE SIGN IN -->
            <script src="https://accounts.google.com/gsi/client" async defer></script>
            <div class="g_id_signin" style="display: flex; justify-content: center; margin-bottom: 1rem;"></div>
            <script>
                window.addEventListener('load', async () => {
                    try {
                        const res = await fetch('/api/config');
                        const config = await res.json();
                        
                        if (config.GOOGLE_CLIENT_ID && typeof google !== 'undefined') {
                            google.accounts.id.initialize({
                                client_id: config.GOOGLE_CLIENT_ID,
                                context: "use",
                                callback: handleGoogleAuth
                            });
                            
                            google.accounts.id.renderButton(
                                document.querySelector('.g_id_signin'),
                                { theme: "outline", size: "large", text: "signup_with", shape: "rectangular", logo_alignment: "left" }
                            );
                        } else {
                            document.querySelector('.g_id_signin').innerHTML = '<span style="color:var(--text-muted); font-size:0.8rem;">Google přihlášení není nakonfigurováno.</span>';
                        }
                    } catch (e) {
                        console.error("Google init failed", e);
                    }
                });
            </script>

            <div class="form-footer">
                Již máš účet? <a href="login.html">Přihlásit se</a>
            </div>
        </div>
    </div>

    <script src="modal.js"></script>
    <script>
        async function handleRegister(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = e.target.querySelector('button');
            const emailErr = document.getElementById('emailError');
            const passErr = document.getElementById('passwordError');

            document.querySelectorAll('.error-msg').forEach(el => el.style.display = 'none');

            if (password !== confirmPassword) {
                passErr.style.display = 'block';
                return;
            }

            const usernameRegex = /^[a-zA-Z0-9_]{3,20}$/;
            if (!usernameRegex.test(username)) {
                showModal("Neplatné jméno", "Uživatelské jméno obsahuje nepovolené znaky.<br>Použij pouze písmena, čísla a podtržítko.", "error");
                return;
            }

            btn.innerText = "Kontroluji dostupnost...";
            btn.style.opacity = "0.7";

            try {
                const response = await fetch('/api/check-user', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email })
                });
                const checkData = await response.json();

                if (checkData.exists) {
                    emailErr.innerText = "Uživatel s tímto jménem nebo emailem již existuje.";
                    emailErr.style.display = 'block';
                    btn.innerText = "Registrovat se";
                    btn.style.opacity = "1";
                    return;
                }

                btn.innerText = "Odesílám ověřovací email...";

                const verificationCode = Math.floor(100000 + Math.random() * 900000).toString();

                const tempUser = {
                    username: username,
                    email: email,
                    password: password,
                    verificationCode: verificationCode,
                    emailSent: false
                };

                const templateParams = {
                    to_email: email,
                    to_name: username,
                    code: verificationCode
                };

                emailjs.send('service_q5rgs6w', 'template_dqk6ayh', templateParams)
                    .then(function (response) {
                        console.log('SUCCESS!', response.status, response.text);
                        tempUser.emailSent = true;
                        finishRegistration(tempUser);
                    }, function (error) {
                        console.log('FAILED...', error);
                        tempUser.emailSent = false;
                        finishRegistration(tempUser);
                    });

            } catch (err) {
                console.error(err);
                showModal("Chyba", "Chyba při komunikaci se serverem.", "error");
                btn.innerText = "Registrovat se";
                btn.style.opacity = "1";
            }
        }

        function finishRegistration(tempUser) {
            localStorage.setItem('hackshield_temp_user', JSON.stringify(tempUser));
            window.location.href = 'verify.html';
        }

        async function handleGoogleAuth(response) {
            try {
                const res = await fetch('/api/auth/google', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ credential: response.credential })
                });

                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('hackshield_user', JSON.stringify(data.user));
                    
                    document.querySelector('.auth-card h2').innerText = "Úspěch!";
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 800);
                } else {
                    throw new Error(data.message || 'Google Auth failed');
                }
            } catch (err) {
                console.error(err);
                showModal("Chyba", "Google registrace selhala.", "error");
            }
        }

        // --- FORM PERSISTENCE ---
        (function () {
            const uInput = document.getElementById('username');
            const eInput = document.getElementById('email');

            if (uInput && eInput) {
                if (sessionStorage.getItem('pers_username')) uInput.value = sessionStorage.getItem('pers_username');
                if (sessionStorage.getItem('pers_email')) eInput.value = sessionStorage.getItem('pers_email');

                uInput.addEventListener('input', () => sessionStorage.setItem('pers_username', uInput.value));
                eInput.addEventListener('input', () => sessionStorage.setItem('pers_email', eInput.value));
            }
        })();
    </script>
</body>

</html>
