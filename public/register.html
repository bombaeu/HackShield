<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Registrace | HackShield</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function () {
            // ZDE VLOŽ SVŮJ PUBLIC KEY Z EMAILJS (https://dashboard.emailjs.com/admin/account)
            // Příklad: emailjs.init("user_XyZ123...");
            emailjs.init("gUPFo7FLqNfZ8FEDf"); // Tvůj klíč
        })();
    </script>
    <style>
        body {
            overflow: hidden;
        }

        .error-msg {
            color: var(--danger);
            font-size: 0.85rem;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="bg-grid"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div style="text-align: center; margin-bottom: 2rem;">
                <div
                    style="width: 60px; height: 60px; margin: 0 auto 1.5rem; border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1);">
                    <img src="assets/fotka.png" alt="HackShield" style="width: 100%; height: 100%; object-fit: cover;">
                </div>
                <h2>Vytvořit účet</h2>
                <p style="color: var(--text-secondary);">Přidej se k elitní komunitě.</p>
            </div>

            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label class="form-label">Uživatelské jméno</label>
                    <input type="text" id="username" class="form-input" placeholder="HackerName" required minlength="3">
                    <div id="userError" class="error-msg">Toto jméno je již obsazené.</div>
                </div>

                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="name@example.com" required>
                    <div id="emailError" class="error-msg">Tento email je již registrován.</div>
                </div>

                <div class="form-group">
                    <label class="form-label">Heslo</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required
                        minlength="6">
                </div>

                <div class="form-group">
                    <label class="form-label">Potvrzení hesla</label>
                    <input type="password" id="confirmPassword" class="form-input" placeholder="••••••••" required>
                    <div id="passwordError" class="error-msg">Hesla se neshodují.</div>
                </div>

                <button type="submit" class="btn btn-primary"
                    style="width: 100%; justify-content: center; padding: 0.8rem;">
                    Registrovat se
                </button>
            </form>

            <div class="form-footer">
                Již máš účet? <a href="login.html">Přihlásit se</a>
            </div>
        </div>
    </div>

    <script>
        async function handleRegister(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = e.target.querySelector('button');
            const emailErr = document.getElementById('emailError');
            const passErr = document.getElementById('passwordError');

            // Reset errors
            document.querySelectorAll('.error-msg').forEach(el => el.style.display = 'none');

            // Validation 1: Passwords
            if (password !== confirmPassword) {
                passErr.style.display = 'block';
                return;
            }

            // Validation 2: Username Characters (Security)
            const usernameRegex = /^[a-zA-Z0-9_]{3,20}$/;
            if (!usernameRegex.test(username)) {
                alert("Uživatelské jméno obsahuje nepovolené znaky.\nPoužij pouze písmena, čísla a podtržítko.");
                return;
            }

            btn.innerText = "Kontroluji dostupnost...";
            btn.style.opacity = "0.7";

            // Validation 2: Check Server for Duplicates
            try {
                const response = await fetch('/api/check-user', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email })
                });
                const checkData = await response.json();

                if (checkData.exists) {
                    emailErr.innerText = "Uživatel s tímto jménem nebo emailem již existuje.";
                    emailErr.style.display = 'block';
                    btn.innerText = "Registrovat se";
                    btn.style.opacity = "1";
                    return;
                }

                // Validation passed -> Send Email
                btn.innerText = "Odesílám ověřovací email...";

                const verificationCode = Math.floor(100000 + Math.random() * 900000).toString();

                const tempUser = {
                    username: username,
                    email: email,
                    password: password,
                    verificationCode: verificationCode,
                    emailSent: false
                };

                // EmailJS Logic
                const templateParams = {
                    to_email: email,
                    to_name: username,
                    code: verificationCode
                };

                emailjs.send('service_q5rgs6w', 'template_dqk6ayh', templateParams)
                    .then(function (response) {
                        console.log('SUCCESS!', response.status, response.text);
                        tempUser.emailSent = true;
                        finishRegistration(tempUser);
                    }, function (error) {
                        console.log('FAILED...', error);
                        // Fallback (Demo)
                        tempUser.emailSent = false;
                        finishRegistration(tempUser);
                    });

            } catch (err) {
                console.error(err);
                alert("Chyba při komunikaci se serverem.");
                btn.innerText = "Registrovat se";
                btn.style.opacity = "1";
            }
        }

        function finishRegistration(tempUser) {
            // Save temp data for Verify Page to pick up
            localStorage.setItem('hackshield_temp_user', JSON.stringify(tempUser));
            window.location.href = 'verify.html';
        }
    </script>
</body>

</html>
