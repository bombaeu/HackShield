<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Registrace | HackShield</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function () {
            // ZDE VLOŽ SVŮJ PUBLIC KEY Z EMAILJS (https://dashboard.emailjs.com/admin/account)
            // Příklad: emailjs.init("user_XyZ123...");
            emailjs.init("gUPFo7FLqNfZ8FEDf");
        })();
    </script>
    <style>
        body {
            overflow: hidden;
        }

        .error-msg {
            color: var(--danger);
            font-size: 0.85rem;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="bg-grid"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div style="text-align: center; margin-bottom: 2rem;">
                <div
                    style="width: 60px; height: 60px; margin: 0 auto 1.5rem; border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1);">
                    <img src="assets/fotka.png" alt="HackShield" style="width: 100%; height: 100%; object-fit: cover;">
                </div>
                <h2>Vytvořit účet</h2>
                <p style="color: var(--text-secondary);">Přidej se k elitní komunitě.</p>
            </div>

            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label class="form-label">Uživatelské jméno</label>
                    <input type="text" id="username" class="form-input" placeholder="HackerName" required minlength="3">
                </div>

                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="name@example.com" required>
                    <div id="emailError" class="error-msg">Tento email je již registrován.</div>
                </div>

                <div class="form-group">
                    <label class="form-label">Heslo</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required
                        minlength="6">
                </div>

                <div class="form-group">
                    <label class="form-label">Potvrzení hesla</label>
                    <input type="password" id="confirmPassword" class="form-input" placeholder="••••••••" required>
                    <div id="passwordError" class="error-msg">Hesla se neshodují.</div>
                </div>

                <button type="submit" class="btn btn-primary"
                    style="width: 100%; justify-content: center; padding: 0.8rem;">
                    Registrovat se
                </button>
            </form>

            <div class="form-footer">
                Již máš účet? <a href="login.html">Přihlásit se</a>
            </div>
        </div>
    </div>

    <script>
        async function handleRegister(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = e.target.querySelector('button');


            // Basic Validation
            if (password !== confirmPassword) {
                alert("Hesla se neshodují!");
                return;
            }

            btn.innerText = "Zakládám účet...";
            btn.style.opacity = "0.7";

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (data.success) {
                    // Auto-login after register
                    localStorage.setItem('hackshield_user', JSON.stringify(data.user));

                    // Optional: Redirect to verify if we want to enforce it later
                    // For now, go to dashboard
                    window.location.href = 'dashboard.html';
                } else {
                    alert(data.message || "Registrace selhala.");
                    btn.innerText = "Vytvořit účet";
                    btn.style.opacity = "1";
                }
            } catch (err) {
                console.error(err);
                alert("Chyba serveru.");
                btn.innerText = "Vytvořit účet";
                btn.style.opacity = "1";
            }
        }
    </script>
</body>

</html>
